<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Motocross Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }

        .menu-screen.hidden {
            display: none;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .menu-title {
            font-size: 2em;
            margin: 30px 0;
            color: #00d4ff;
        }

        .menu-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
            width: 100%;
            max-width: 600px;
        }

        .menu-btn {
            padding: 20px;
            font-size: 1.2em;
            border: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .menu-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .menu-btn.selected {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            color: #000;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .start-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #gameContainer {
            width: 100%;
            height: 100vh;
            display: none;
        }

        #gameContainer.active {
            display: block;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            z-index: 100;
        }

        .hud-item {
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 250px;
        }

        .hud-label {
            width: 80px;
            color: #00d4ff;
        }

        .hud-bar {
            width: 150px;
            height: 20px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            border-radius: 3px;
            overflow: hidden;
            margin-left: 10px;
        }

        .hud-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            transition: width 0.1s ease;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            font-size: 0.9em;
            z-index: 100;
            max-width: 300px;
        }

        .controls h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .control-item {
            margin: 5px 0;
            color: #aaa;
        }

        .control-key {
            color: #00d4ff;
            font-weight: bold;
        }

        .bike-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            z-index: 100;
        }

        .bike-name {
            font-size: 1.5em;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .track-info {
            color: #aaa;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .menu-title {
                font-size: 1.5em;
            }

            .hud {
                top: 10px;
                left: 10px;
                padding: 15px;
            }

            .hud-item {
                width: 200px;
            }

            .controls {
                bottom: 10px;
                left: 10px;
                font-size: 0.8em;
            }

            .bike-info {
                top: 10px;
                right: 10px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Menu Screen -->
        <div id="menuScreen" class="menu-screen">
            <h1>🏍️ 3D MOTOCROSS GAME</h1>

            <!-- Bike Selection -->
            <div id="bikeMenu">
                <div class="menu-title">Select Your Bike</div>
                <div class="menu-options">
                    <button class="menu-btn" data-bike="ktm">
                        🟠 KTM 450<br><small>High RPM</small>
                    </button>
                    <button class="menu-btn" data-bike="yamaha">
                        🔵 Yamaha YZ<br><small>Balanced</small>
                    </button>
                    <button class="menu-btn" data-bike="honda">
                        🔴 Honda CRF<br><small>Stable</small>
                    </button>
                </div>
            </div>

            <!-- Track Selection -->
            <div id="trackMenu" style="display: none;">
                <div class="menu-title">Select Your Track</div>
                <div class="menu-options">
                    <button class="menu-btn" data-track="street">
                        🛣️ Street Track<br><small>Smooth Asphalt</small>
                    </button>
                    <button class="menu-btn" data-track="motocross">
                        🏜️ Motocross<br><small>Jumps & Bumps</small>
                    </button>
                </div>
            </div>

            <!-- Perspective Selection -->
            <div id="perspectiveMenu" style="display: none;">
                <div class="menu-title">Select Your View</div>
                <div class="menu-options">
                    <button class="menu-btn" data-perspective="1st">
                        👁️ First Person<br><small>Rider's View</small>
                    </button>
                    <button class="menu-btn" data-perspective="3rd">
                        📷 Third Person<br><small>Follow Camera</small>
                    </button>
                </div>
            </div>

            <button id="startBtn" class="start-btn" disabled>START GAME</button>
        </div>

        <!-- Game Canvas -->
        <div id="gameContainer"></div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
